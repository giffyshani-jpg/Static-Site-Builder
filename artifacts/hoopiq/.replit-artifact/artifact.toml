kind = "web"
previewPath = "/"
title = "HoopIQ"
version = "1.0.0"
id = "artifacts/hoopiq"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21534

[services.development]
run = "pnpm --filter @workspace/hoopiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hoopiq", "run", "build" ]
serve = "static"
publicDir = "artifacts/hoopiq/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21534"
BASE_PATH = "/"
